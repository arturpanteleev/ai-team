name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true

      - name: Build
        run: go build ./cmd/ai-team

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: E2E test
        run: go test ./e2etest/...
