name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.5'
          check-latest: true
      - name: Build
        run: go build ./cmd/ai-team
      - name: Verify module checksums
        run: go mod verify

  specs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Validate OpenSpec contracts
        run: npx --yes @fission-ai/openspec@1.4.1 validate --all --strict --no-interactive

  lint:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.5'
          check-latest: true
      - name: Vet
        run: go vet ./...
      - name: Gofmt
        run: |
          UNFORMATTED=$(gofmt -l .)
          if [ -n "$UNFORMATTED" ]; then
            echo "Файлы не отформатированы gofmt:" >&2
            echo "$UNFORMATTED" >&2
            exit 1
          fi

  unit-tests:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.5'
          check-latest: true
      - name: Unit tests
        run: go test ./pkg/...
      - name: Coverage gate
        run: |
          go test -coverprofile=coverage.out ./pkg/...
          COVERAGE=$(go tool cover -func=coverage.out | awk '/^total:/ {gsub("%", "", $3); print $3}')
          awk -v coverage="$COVERAGE" 'BEGIN { if (coverage < 60.0) { printf "coverage %.1f%% is below 60.0%%\n", coverage; exit 1 } }'
      - name: Safety package coverage floor
        run: |
          for package in checks delivery evidence pipeline runtime safeio; do
            go test -coverprofile="coverage-${package}.out" "./pkg/${package}"
            coverage=$(go tool cover -func="coverage-${package}.out" | awk '/^total:/ {gsub("%", "", $3); print $3}')
            awk -v package="$package" -v coverage="$coverage" 'BEGIN { if (coverage < 50.0) { printf "%s coverage %.1f%% is below 50.0%%\n", package, coverage; exit 1 } }'
          done

  race-tests:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.5'
          check-latest: true
      - name: Race detector
        run: go test -race ./pkg/...

  e2e-tests:
    needs: unit-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.5'
          check-latest: true
      - name: E2E tests
        run: go test ./e2etest/...

  frontend:
    needs: build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install
        run: npm ci
      - name: Typecheck and build
        run: npm run build
      - name: Verify embedded frontend is current
        run: git diff --exit-code -- dist
      - name: Lint
        run: npm run lint
      - name: Frontend tests
        run: npm test
      - name: Dependency audit
        run: npm audit --audit-level=high

  security:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.5'
      - name: Go vulnerability scan
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.6.0 ./...
