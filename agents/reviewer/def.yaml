name: reviewer
description: Reviewer — проверяет код на соответствие спецификации
runtime: agentcli
cli: opencode
prompt_file: prompt.md
mutation: none
verdict:
  required: true
  marker: Verdict
  values: [APPROVED, CHANGES_REQUESTED, REJECTED]
inputs:
  specs: '{feature}/specs'
  candidate: '{feature}/.control/review-candidate.json'
outputs:
  review: '{feature}/review.md'
