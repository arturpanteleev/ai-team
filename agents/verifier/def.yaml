name: verifier
description: Unified verification pass
runtime: agentcli
cli: opencode
prompt_file: prompt.md
mutation: none
verdict:
  required: true
  marker: Verdict
  values: [APPROVED, CHANGES_REQUESTED]
inputs:
  proposal: '{feature}/proposal.md'
  specs: '{feature}/specs'
  review: '{feature}/review.md'
  test-report: '{feature}/test-report.md'
  candidate: '{feature}/.control/verification-candidate.json'
outputs:
  verification: '{feature}/verification.md'
